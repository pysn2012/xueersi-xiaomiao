# =============================================================================
# 工作原理：
# - 每个按钮在按下时（on_press/on_click）会向 Home Assistant 发送命令
# - 按钮的状态由 sensors.yaml 中定义的传感器更新
# - 当传感器状态变化时，按钮的外观会随之更新（选中/未选中）
#
# 核心概念：
# - "id:" 是一个唯一名称，用于在其他文件中引用此元素
# - "entity_id:" 指向 Home Assistant 中的某个设备或实体
# - "checkable: true" 表示按钮能以视觉方式显示开/关状态
# - "$variable" 变量（如 $button_width）在 template.yaml 中定义
# - sensors.yaml 中的传感器监听 Home Assistant 并更新按钮状态
# =============================================================================

lvgl:
  buffer_size: 100%
  top_layer:
    widgets:
    
      # =========================================================================
      # 温度显示（屏幕左上角）
      # =========================================================================
      # 显示内容：
      #   显示两个温度值："室外° / 室内°"
      #   示例："15° / 22°" 表示室外 15°C，办公室内 22°C
      #
      # 数据来源（在 sensors.yaml 中定义）：
      #   - 左侧数字：sensor.outdoor_temperature（天气/室外传感器）
      #   - 右侧数字：sensor.office_temperature（室内房间传感器）
      #
      # 更新机制：
      #   当任一温度传感器在 Home Assistant 中发生变化时，
      #   sensors.yaml 会触发此标签文本的更新。
      # =========================================================================
      - label:
          text: "-° / -°"
          id: temperatures
          styles: roboto15_style
          align: top_left
          x: 8
          y: 4
          text_color: 0xFFFFFF

      # =========================================================================
      # 时钟显示（屏幕顶部居中）
      # =========================================================================
      # 显示内容：
      #   当前时间，24 小时格式（例如："14:30"）
      #
      # 数据来源：
      #   time 组件（在 time.yaml 中配置）会与 Home Assistant
      #   同步时间，并每分钟更新此标签。
      # =========================================================================
      - label:
          text: "--:--"
          id: display_time
          styles: roboto15_style
          align: top_mid
          x: 0
          y: 4
          text_align: center
          text_color: 0xFFFFFF
          
  pages:
    - id: main_page
      layout: 
        type: grid
        grid_columns: [fr(1), fr(1)]
        grid_rows: [fr(1), fr(1)]
      scrollbar_mode: "off"
      scroll_dir: "hor"
      width: 100%
      bg_color: Black
      bg_opa: cover
      pad_top: 34
      pad_bottom: 5
      pad_left: 5
      pad_right: 5
      
      widgets:
      
        # =========================================================================
        # 按钮：插座1
        # =========================================================================
        - button: 
            height: $button_height_single
            width: $button_width
            checkable: true
            id: chuangmi_socket1_button
            styles: control
            grid_cell_column_pos: 0
            grid_cell_row_pos: 0
            widgets:
              - label:
                  text_font: $icon_font
                  align: top_left
                  id: chuangmi_socket1_icon                
                  text: $power
              - label:
                  align: bottom_left
                  id: chuangmi_socket1_label
                  text: "Socket"
            on_click:
              - homeassistant.action:
                  service: switch.toggle
                  data:
                    entity_id: switch.chuangmi_cn_125697630_m3_on_p_2_1

        # =========================================================================
        # 按钮：插座2
        # =========================================================================
        - button: 
            height: $button_height_single
            width: $button_width
            checkable: true
            id: chuangmi_socket2_button
            styles: control
            grid_cell_column_pos: 1
            grid_cell_row_pos: 0
            widgets:
              - label:
                  text_font: $icon_font
                  align: top_left
                  id: chuangmi_socket2_icon                
                  text: $power
              - label:
                  align: bottom_left
                  id: chuangmi_socket2_label
                  text: "Socket"
            on_click:
              - homeassistant.action:
                  service: switch.toggle
                  data:
                    entity_id: switch.chuangmi_cn_125796823_m3_on_p_2_1

        # =========================================================================
        # 按钮：客厅大灯（进入客厅大灯控制页面）
        # =========================================================================
        - button: 
            height: $button_height_single
            width: $button_width
            checkable: false
            id: house_light_button
            styles: control
            grid_cell_column_pos: 0
            grid_cell_row_pos: 1
            widgets:
              - label:
                  text_font: $icon_font
                  align: top_left
                  text: $lightbulb
              - label:
                  align: bottom_left
                  text: "Led"
            on_click:
              - lvgl.page.show: light_page

        # =========================================================================
        # 按钮：更多
        # =========================================================================
        - button:
            height: $button_height_single
            width: $button_width
            checkable: false
            id: extras_nav_button
            styles: control
            grid_cell_column_pos: 1
            grid_cell_row_pos: 1
            widgets:
              - label:
                  text_font: $icon_font
                  align: top_left
                  text: $chevron_left
              - label:
                  align: bottom_left
                  text: "More"
            on_click:
              - lvgl.page.show: extras_page

    # 附加控制页面
    - id: extras_page
      layout:
        type: grid
        grid_columns: [fr(1), fr(1)]
        grid_rows: [fr(1), fr(1)]
      scrollbar_mode: "off"
      scroll_dir: "hor"
      width: 100%
      bg_color: Black
      bg_opa: cover
      pad_top: 34
      pad_bottom: 5
      pad_left: 5
      pad_right: 5

      widgets:

        # =========================================================================
        # 按钮：返回（回到主页面）
        # =========================================================================
        - button:
            height: $button_height_single
            width: $button_width
            checkable: false
            id: extras_back_button
            styles: control
            grid_cell_column_pos: 0
            grid_cell_row_pos: 0
            widgets:
              - label:
                  text_font: $icon_font
                  align: top_left
                  text: $chevron_left
              - label:
                  align: bottom_left
                  text: "Back"
            on_click:
              - lvgl.page.show: main_page

        # =========================================================================
        # 按钮：插座3
        # =========================================================================
        - button: 
            height: $button_height_single
            width: $button_width
            checkable: true
            id: chuangmi_socket3_button
            styles: control
            grid_cell_column_pos: 1
            grid_cell_row_pos: 0
            widgets:
              - label:
                  text_font: $icon_font
                  align: top_left
                  id: chuangmi_socket3_icon                
                  text: $power
              - label:
                  align: bottom_left
                  id: chuangmi_socket3_label
                  text: "Socket"
            on_click:
              - homeassistant.action:
                  service: switch.toggle
                  data:
                    entity_id: switch.chuangmi_cn_125520813_m3_on_p_2_1


    # 客厅大灯页面
    - id: light_page
      layout: 
        type: flex
        flex_flow: column_wrap
      scrollbar_mode: "off"
      scroll_dir: "hor"
      width: 100%
      bg_color: Black
      bg_opa: cover
      pad_top: 34
      pad_bottom: 5
      pad_left: 5
      pad_right: 5

      widgets:

        # =========================================================================
        # 按钮：返回（回到主页面）
        # =========================================================================
        - button: 
            height: $button_height_single
            width: $button_width
            checkable: false
            id: blinds_back_button
            styles: control
            widgets:
              - label:
                  text_font: $icon_font
                  align: top_left
                  text: $chevron_left
              - label:
                  align: bottom_left
                  text: "Back"
            on_click:
              - lvgl.page.show: main_page

        # =========================================================================
        # 亮度控制
        - arc:
            id: house_light_arc
            x: 60
            y: 80
            width: 160
            height: 160
            min_value: 0
            max_value: 100
            start_angle: 135
            end_angle: 45
            rotation: 0
            value: 50
            arc_width: 18
            arc_color: 0x2A2A2A
            clickable: true
            adjustable: true
            indicator:
              arc_color: 0xFF8C00
              arc_width: 18
            knob:
              bg_color: 0xFFFFFF
            on_value:
              - homeassistant.service:
                  service: light.turn_on
                  data:
                    entity_id: light.opple_cn_246935575_bydceiling_s_2_light
                    brightness_pct: !lambda return (int)x;

