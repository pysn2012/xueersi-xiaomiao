# 设备在线状态
binary_sensor:
  - platform: status
    name: "Online"
    id: ink_ha_connected
    icon: mdi:check-network


sensor:
# 运行时间
  - platform: uptime
    name: "Uptime Sensor"
    id: uptime_sensor
    entity_category: diagnostic
    internal: true

# Wifi信号强度
  - platform: wifi_signal
    name: "Wifi Signal dB"
    id: wifi_signal_db
    update_interval: 60s
    entity_category: "diagnostic"
    internal: true

# Wifi信号强度--百分比
  - platform: copy
    source_id: wifi_signal_db
    name: "Wifi Strength"
    id: wifi_strength
    filters:
      - lambda: return min(max(2 * (x + 100.0), 0.0), 100.0);
    unit_of_measurement: "%"
    icon: mdi:wifi
    entity_category: "diagnostic"
    device_class: ""

# 光照传感器 GPIO36 (ADC1_CH0)
  - platform: adc
    pin: GPIO36
    id: adc_light
    name: "Light"
    update_interval: 10s
    attenuation: 12db   # 3.3V 满量程推荐 12db
    filters:
      - calibrate_linear:
          # 按实际校准：0V→最暗，3.3V→最亮
          - 0.0 -> 0.0
          - 3.3 -> 100.0
    unit_of_measurement: "%"
    device_class: illuminance
    state_class: measurement

# 热敏电阻 GPIO39 (ADC1_CH3)
  - platform: adc
    pin: GPIO39
    id: adc_ntc
    update_interval: 10s
    attenuation: 12db

  - platform: resistance
    id: ntc_resistance
    sensor: adc_ntc
    configuration: DOWNSTREAM  # 分压电阻接 GND
    resistor: 10kOhm           # 板上分压电阻，按实际改
    reference_voltage: 3.3V

  - platform: ntc
    id: board_temp
    name: "Temp"
    sensor: ntc_resistance
    calibration:
      b_constant: 3950          # 常见 NTC 参数
      reference_temperature: 25°C
      reference_resistance: 10kOhm
    unit_of_measurement: "°C"
    device_class: temperature
    state_class: measurement

text_sensor:
# Ip地址
  - platform: wifi_info
    ip_address:
      name: IP Address
      id: ip_address
      icon: mdi:ip-network