# 时间同步
time:
  - platform: sntp
    id: sntp_time
    timezone: Asia/Shanghai
    servers:
     - cn.pool.ntp.org
     - ntp.aliyun.com 
     - ntp.tencent.com
    on_time_sync:
      - script.execute: time_update
    on_time:
      - minutes: '*'
        seconds: 0
        then:
          - script.execute: time_update

# 更新时间
script:
  - id: time_update
    then:
      - lvgl.label.update:
          id: display_time
          text: !lambda |-
            static char time_buf[17];
            auto now = id(sntp_time).now();
            snprintf(time_buf, sizeof(time_buf), "%02d:%02d", now.hour, now.minute);
            return time_buf;